name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/pedidos to keep Supabase active
        run: |
          status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 https://coffeeandbreakld.cl/api/pedidos)
          echo "HTTP status: $status"
          if [ "$status" != "200" ]; then
            echo "ERROR: expected 200, got $status"
            exit 1
          fi
          echo "OK: Supabase keep-alive successful"
